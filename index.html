<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tests — Beginner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f0f2f5; color: #1a1a2e; line-height: 1.6;
  min-height: 100vh; min-height: 100dvh;
  -webkit-text-size-adjust: 100%;
}
.wrap { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }

header { text-align: center; padding: 24px 0 12px; }
header h1 { font-size: 1.8rem; color: #2d3436; }
header p { color: #636e72; margin-top: 4px; font-size: .95rem; }

.stats {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  margin: 20px 0;
}
.stat-item {
  background: #fff; border-radius: 12px; padding: 14px 24px;
  text-align: center; min-width: 130px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.stat-item .val { font-size: 1.6rem; font-weight: 700; color: #6c5ce7; }
.stat-item .lbl { font-size: .8rem; color: #636e72; margin-top: 2px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px; margin-top: 20px;
}
.card {
  background: #fff; border-radius: 14px; padding: 20px;
  border: 2px solid transparent; transition: all .2s;
  display: flex; flex-direction: column; justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  text-decoration: none; color: inherit;
  min-height: 120px;
}
.card:hover { border-color: #6c5ce7; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,92,231,.15); }
.card:active { transform: translateY(0); }
.card h3 { font-size: 1.05rem; margin-bottom: 4px; color: #2d3436; }
.card .desc { font-size: .85rem; color: #636e72; flex-grow: 1; }
.card .bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 8px; }
.badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-size: .78rem; font-weight: 600; white-space: nowrap;
}
.badge.none { background: #dfe6e9; color: #636e72; }
.badge.low { background: #ffeaa7; color: #6c5200; }
.badge.mid { background: #81ecec; color: #005f5f; }
.badge.high { background: #55efc4; color: #004d30; }
.arrow { font-size: 1.2rem; color: #b2bec3; transition: color .2s; }
.card:hover .arrow { color: #6c5ce7; }

@media (max-width: 600px) {
  .wrap { padding: 12px 10px; }
  header { padding: 16px 0 8px; }
  header h1 { font-size: 1.35rem; }
  header p { font-size: .85rem; }
  .stats { gap: 8px; }
  .stat-item { padding: 10px 16px; min-width: 100px; flex: 1; }
  .stat-item .val { font-size: 1.3rem; }
  .grid { grid-template-columns: 1fr; gap: 10px; margin-top: 14px; }
  .card { padding: 16px; min-height: 100px; border-radius: 12px; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>English Tests</h1>
    <p>Beginner — выбери тему и проверь знания</p>
  </header>
  <div class="stats" id="global-stats"></div>
  <div class="grid" id="topics-grid"></div>
</div>

<script src="data.js"></script>
<script>
(function() {
  const best = getBestResults();
  const done = Object.keys(best).length;
  const avgPct = done ? Math.round(Object.values(best).reduce((s, b) => s + b.pct, 0) / done) : 0;

  document.getElementById('global-stats').innerHTML =
    '<div class="stat-item"><div class="val">' + done + '/' + tests.length + '</div><div class="lbl">Пройдено тестов</div></div>' +
    '<div class="stat-item"><div class="val">' + avgPct + '%</div><div class="lbl">Средний результат</div></div>';

  document.getElementById('topics-grid').innerHTML = tests.map(function(t) {
    var b = best[t.id];
    var badgeClass = 'none', badgeText = 'не пройден';
    if (b) {
      badgeText = b.pct + '% (' + b.score + '/' + b.total + ')';
      badgeClass = b.pct >= 80 ? 'high' : b.pct >= 50 ? 'mid' : 'low';
    }
    return '<a class="card" href="test.html?id=' + t.id + '">' +
      '<div><h3>' + t.id + '. ' + t.title + '</h3><div class="desc">' + t.desc + '</div></div>' +
      '<div class="bottom"><span class="badge ' + badgeClass + '">' + badgeText + '</span><span class="arrow">&rarr;</span></div>' +
    '</a>';
  }).join('');
})();
</script>
</body>
</html>
