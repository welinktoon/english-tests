<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tests — Beginner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; line-height: 1.6; }
.wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
header { text-align: center; padding: 30px 0 20px; }
header h1 { font-size: 2rem; color: #2d3436; }
header p { color: #636e72; margin-top: 6px; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 24px; }
.card {
  background: #fff; border-radius: 12px; padding: 20px; cursor: pointer;
  border: 2px solid transparent; transition: all .2s; position: relative; height: 100%;
  display: flex; flex-direction: column; justify-content: space-between;
}
.card:hover { border-color: #6c5ce7; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,92,231,.15); }
.card h3 { font-size: 1.05rem; margin-bottom: 6px; }
.card .desc { font-size: .85rem; color: #636e72; flex-grow: 1; }
.card .badge {
  display: inline-block; margin-top: 10px; padding: 3px 10px; border-radius: 20px;
  font-size: .78rem; font-weight: 600;
}
.badge.none { background: #dfe6e9; color: #636e72; }
.badge.low { background: #ffeaa7; color: #6c5200; }
.badge.mid { background: #81ecec; color: #005f5f; }
.badge.high { background: #55efc4; color: #004d30; }

/* Test view */
#test-view { display: none; }
.back-btn {
  background: none; border: none; font-size: 1rem; color: #6c5ce7; cursor: pointer;
  margin-bottom: 16px; font-weight: 600;
}
.back-btn:hover { text-decoration: underline; }
.progress-bar { background: #dfe6e9; border-radius: 8px; height: 8px; margin-bottom: 20px; }
.progress-fill { height: 100%; background: #6c5ce7; border-radius: 8px; transition: width .3s; }
.question-card {
  background: #fff; border-radius: 12px; padding: 28px; max-width: 700px; margin: 0 auto;
}
.q-counter { font-size: .85rem; color: #636e72; margin-bottom: 8px; }
.q-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; }
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  background: #f8f9fa; border: 2px solid #dfe6e9; border-radius: 10px; padding: 14px 18px;
  font-size: 1rem; cursor: pointer; text-align: left; transition: all .15s;
}
.opt-btn:hover { border-color: #6c5ce7; background: #f0edff; }
.opt-btn.correct { border-color: #00b894; background: #d4fce8; }
.opt-btn.wrong { border-color: #d63031; background: #ffe0e0; }
.opt-btn.disabled { pointer-events: none; opacity: .7; }
.opt-btn.disabled.correct { opacity: 1; }
.next-btn {
  display: none; margin-top: 16px; background: #6c5ce7; color: #fff; border: none;
  padding: 12px 28px; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: 600;
}
.next-btn:hover { background: #5a4bd1; }

/* Result */
.result-card {
  background: #fff; border-radius: 12px; padding: 36px; max-width: 500px; margin: 0 auto; text-align: center;
}
.result-card .score { font-size: 3rem; font-weight: 700; color: #6c5ce7; }
.result-card .pct { font-size: 1.3rem; color: #636e72; margin: 8px 0 20px; }
.result-card .msg { font-size: 1.1rem; margin-bottom: 20px; }
.result-card .best-note { font-size: .9rem; color: #00b894; margin-bottom: 16px; }
.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn-row button {
  padding: 12px 24px; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: 600; border: none;
}
.btn-retry { background: #6c5ce7; color: #fff; }
.btn-retry:hover { background: #5a4bd1; }
.btn-home { background: #dfe6e9; color: #2d3436; }
.btn-home:hover { background: #c8d6db; }

/* Stats bar */
.stats { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
.stat-item { background: #fff; border-radius: 10px; padding: 12px 20px; text-align: center; min-width: 120px; }
.stat-item .val { font-size: 1.5rem; font-weight: 700; color: #6c5ce7; }
.stat-item .lbl { font-size: .8rem; color: #636e72; }

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
  header h1 { font-size: 1.5rem; }
}
</style>
</head>

// === COOKIES ===
function setCookie(name, value, days) {
  const d = new Date();
  d.setTime(d.getTime() + days * 86400000);
  document.cookie = name + "=" + encodeURIComponent(JSON.stringify(value)) + ";expires=" + d.toUTCString() + ";path=/;SameSite=Lax";
}
function getCookie(name) {
  const v = document.cookie.split('; ').find(r => r.startsWith(name + '='));
  if (!v) return null;
  try { return JSON.parse(decodeURIComponent(v.split('=').slice(1).join('='))); } catch { return null; }
}
function getBestResults() { return getCookie('eng_best') || {}; }
function saveBest(testId, pct, score, total) {
  const best = getBestResults();
  if (!best[testId] || pct > best[testId].pct) {
    best[testId] = { pct, score, total, date: new Date().toLocaleDateString('ru') };
  }
  setCookie('eng_best', best, 365);
}

// === RENDER MAIN ===
function renderMain() {
  document.getElementById('main-view').style.display = '';
  document.getElementById('test-view').style.display = 'none';
  const best = getBestResults();
  const grid = document.getElementById('topics-grid');

  // Global stats
  const done = Object.keys(best).length;
  const avgPct = done ? Math.round(Object.values(best).reduce((s, b) => s + b.pct, 0) / done) : 0;
  document.getElementById('global-stats').innerHTML = `
    <div class="stat-item"><div class="val">${done}/${tests.length}</div><div class="lbl">Тестов пройдено</div></div>
    <div class="stat-item"><div class="val">${avgPct}%</div><div class="lbl">Средний результат</div></div>
  `;

  grid.innerHTML = tests.map(t => {
    const b = best[t.id];
    let badgeClass = 'none', badgeText = 'не пройден';
    if (b) {
      badgeText = `${b.pct}% (${b.score}/${b.total})`;
      badgeClass = b.pct >= 80 ? 'high' : b.pct >= 50 ? 'mid' : 'low';
    }
    return `<div class="card" onclick="startTest(${t.id})">
      <div><h3>${t.id}. ${t.title}</h3><div class="desc">${t.desc}</div></div>
      <div><span class="badge ${badgeClass}">${badgeText}</span></div>
    </div>`;
  }).join('');
}

// === TEST LOGIC ===
let current = null;
let qIndex = 0;
let correctCount = 0;

function startTest(id) {
  current = tests.find(t => t.id === id);
  qIndex = 0;
  correctCount = 0;
  // Shuffle options for each question (keep track of correct answer)
  current._shuffled = current.questions.map(q => {
    const indices = q.opts.map((_, i) => i);
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    return { q: q.q, opts: indices.map(i => q.opts[i]), correctIdx: indices.indexOf(q.ans) };
  });
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('test-view').style.display = '';
  document.getElementById('test-title').textContent = current.title + ' — ' + current.desc;
  renderQuestion();
}

function renderQuestion() {
  const total = current._shuffled.length;
  document.getElementById('progress').style.width = ((qIndex / total) * 100) + '%';
  if (qIndex >= total) return showResult();
  const q = current._shuffled[qIndex];
  document.getElementById('question-area').innerHTML = `
    <div class="question-card">
      <div class="q-counter">Вопрос ${qIndex + 1} из ${total}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${q.opts.map((o, i) =>
        `<button class="opt-btn" onclick="answer(${i})">${o}</button>`
      ).join('')}</div>
      <button class="next-btn" id="next-btn" onclick="nextQ()">Далее &rarr;</button>
    </div>`;
}

function answer(idx) {
  const q = current._shuffled[qIndex];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((b, i) => {
    b.classList.add('disabled');
    if (i === q.correctIdx) b.classList.add('correct');
    if (i === idx && idx !== q.correctIdx) b.classList.add('wrong');
  });
  if (idx === q.correctIdx) correctCount++;
  document.getElementById('next-btn').style.display = 'inline-block';
}

function nextQ() {
  qIndex++;
  renderQuestion();
}

function showResult() {
  const total = current._shuffled.length;
  const pct = Math.round((correctCount / total) * 100);
  saveBest(current.id, pct, correctCount, total);
  const best = getBestResults()[current.id];
  const isNewBest = best.pct === pct;

  let msg = '', emoji = '';
  if (pct >= 90) { msg = 'Отлично!'; emoji = '&#127942;'; }
  else if (pct >= 70) { msg = 'Хороший результат!'; emoji = '&#128170;'; }
  else if (pct >= 50) { msg = 'Неплохо, но можно лучше'; emoji = '&#128221;'; }
  else { msg = 'Стоит повторить тему'; emoji = '&#128218;'; }

  document.getElementById('progress').style.width = '100%';
  document.getElementById('question-area').innerHTML = `
    <div class="result-card">
      <div style="font-size:3rem">${emoji}</div>
      <div class="score">${correctCount} / ${total}</div>
      <div class="pct">${pct}% правильных ответов</div>
      <div class="msg">${msg}</div>
      ${isNewBest ? '<div class="best-note">Новый лучший результат!</div>' : `<div style="font-size:.85rem;color:#636e72;margin-bottom:12px">Лучший: ${best.pct}% (${best.date})</div>`}
      <div class="btn-row">
        <button class="btn-retry" onclick="startTest(${current.id})">Пройти заново</button>
        <button class="btn-home" onclick="goHome()">К списку</button>
      </div>
    </div>`;
}

function goHome() { renderMain(); }

// Init
renderMain();
</script>
</body>
</html>
